# Build and publish standalone opstat binaries on tag push.
#
# Triggers: git tag v* (e.g. v0.1.2) && git push --tags
# Matrix:   Ubuntu, macOS (Apple Silicon), Windows (native PyInstaller per OS)
# Result:   Artifacts uploaded to the GitHub Release for that tag
# Note:     Intel macOS (x86_64) builds are intentionally not produced.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest -v

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: opstat-linux-x86_64
          - os: macos-latest
            artifact: opstat-macos-arm64
          - os: windows-latest
            artifact: opstat-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip wheel pyinstaller

      - name: Build binary
        shell: bash
        run: |
          python scripts/build_opstat.py --name "${{ matrix.artifact }}"
          ls -la releases/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: releases/${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p dist-release
          find release-assets -type f -exec cp -v {} dist-release/ \;
          chmod +x dist-release/opstat-* || true
          ls -la dist-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
